<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuscaVagas | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg text-white font-bold text-xl shadow-lg shadow-indigo-600/30">
                    🔍
                </div>
                <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                    BuscaVagas
                </span>
            </div>
            <div class="text-sm text-slate-400">
                Status API: <span class="text-emerald-400 font-medium">● Online</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-slate-800/50 border border-slate-700/50 p-6 rounded-2xl mb-8">
            <div>
                <h1 class="text-2xl font-bold">Vagas Encontradas</h1>
                <p class="text-slate-400 text-sm mt-1">Resultados obtidos via web scraping em tempo real.</p>
            </div>
            <button onclick="buscarVagas()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-500 active:scale-95 transition text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2">
                🔄 Atualizar Vagas
            </button>
        </div>

        <div id="loading" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-pulse">
            <div class="bg-slate-800/40 h-48 rounded-2xl border border-slate-700/30"></div>
            <div class="bg-slate-800/40 h-48 rounded-2xl border border-slate-700/30"></div>
            <div class="bg-slate-800/40 h-48 rounded-2xl border border-slate-700/30"></div>
        </div>

        <div id="vagas-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="no-results" class="hidden text-center py-16 bg-slate-800/20 border border-dashed border-slate-700 rounded-2xl">
            <p class="text-slate-400 text-lg">Nenhuma vaga encontrada. Clique em atualizar para buscar.</p>
        </div>
    </main>

    <script>
        async function buscarVagas() {
            const grid = document.getElementById('vagas-grid');
            const loading = document.getElementById('loading');
            const noResults = document.getElementById('no-results');

            // Resetar estados
            grid.innerHTML = '';
            loading.classList.remove('hidden');
            noResults.classList.add('hidden');

            try {
                // Faz a requisição para a sua rota do controller Express
                const response = await fetch('/api/vagas');
                const vagas = await response.json();

                loading.classList.add('hidden');

                if (!vagas || vagas.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                // Renderiza cada vaga dinamicamente
                vagas.forEach(vaga => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-800/60 border border-slate-700 hover:border-indigo-500/50 rounded-2xl p-6 flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-indigo-500/5 shadow-md group";

                    // Altere as propriedades (vaga.titulo, vaga.link, etc) de acordo com o JSON retornado pelo seu Scraper
                    card.innerHTML = `
                        <div>
                            <div class="flex items-start justify-between gap-2 mb-4">
                                <span class="bg-indigo-500/10 text-indigo-400 text-xs px-2.5 py-1 rounded-full font-semibold border border-indigo-500/20">
                                    ${vaga.empresa || 'Empresa Privada'}
                                </span>
                                <span class="text-xs text-slate-500">${vaga.localizacao || 'Remoto / Brasil'}</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-100 group-hover:text-indigo-400 transition-colors line-clamp-2 mb-2">
                                ${vaga.titulo || 'Título não informado'}
                            </h3>
                            <p class="text-slate-400 text-sm line-clamp-3 mb-4">
                                ${vaga.descricao || 'Clique no botão abaixo para conferir os detalhes desta oportunidade direto na plataforma.'}
                            </p>
                        </div>
                        <div class="pt-4 border-t border-slate-700/50 flex items-center justify-between mt-auto">
                            <span class="text-xs font-semibold text-emerald-400">${vaga.salario || 'A combinar'}</span>
                            <a href="${vaga.link || '#'}" target="_blank" class="inline-flex items-center gap-1 text-sm font-medium text-cyan-400 hover:text-cyan-300 transition-colors">
                                Ver Vaga <span class="transform group-hover:translate-x-1 transition-transform">→</span>
                            </a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Erro ao buscar vagas:", error);
                loading.classList.add('hidden');
                noResults.classList.remove('hidden');
                noResults.innerHTML = `<p class="text-rose-400 text-lg">Erro ao conectar com o servidor. Verifique o terminal.</p>`;
            }
        }

        // Executa a busca assim que a página carrega
        document.addEventListener('DOMContentLoaded', buscarVagas);
    </script>
</body>
</html>
